<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✦ Tähtien Viesti ✦</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Raleway', sans-serif; background: #fdf0f3; color: #1a0a0e; min-height: 100vh; padding: 2rem 1rem; }
  .stars-bg { position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 0; }
  .star { position: absolute; border-radius: 50%; background: #c08090; opacity: 0; animation: twinkle var(--d) ease-in-out infinite var(--delay); }
  @keyframes twinkle { 0%,100%{opacity:0} 50%{opacity:var(--op)} }
  .container { position: relative; z-index: 1; max-width: 780px; margin: 0 auto; }

  .api-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .api-banner label { font-family: 'Cinzel', serif; font-size: 11px; color: #7a2030; letter-spacing: .1em; white-space: nowrap; }
  .api-banner input { flex: 1; min-width: 180px; background: #fae8ec; border: 0.5px solid #e0a8b5; border-radius: 6px; color: #1a0a0e; padding: .45rem .8rem; font-family: monospace; font-size: 13px; }

  .api-status { font-size: 11px; color: #6a3040; }
  .api-status.ok { color: #2a7a2a; }
  .api-note { font-size: 11px; color: #7a2030; margin-top: 8px; }

  h1 { font-family: 'Cinzel', serif; font-size: 26px; font-weight: 600; color: #8b3a52; text-align: center; letter-spacing: .15em; margin-bottom: .4rem; }
  .subtitle { text-align: center; font-size: 12px; color: #a89880; letter-spacing: .2em; text-transform: uppercase; margin-bottom: 2rem; }

  .tabs { display: flex; border-radius: 8px; overflow: hidden; border: 0.5px solid #e8b0bc; margin-bottom: 2rem; }
  .tab { flex: 1; padding: .75rem; background: #fae8ec; color: #a89880; border: none; cursor: pointer; font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: .08em; transition: all .2s; }

  .panel { display: none; }

  .sign-btn { background: #fae8ec; border: 0.5px solid #e0a8b5; border-radius: 8px; padding: .75rem .4rem; color: #1a0a0e; cursor: pointer; text-align: center; font-family: 'Raleway', sans-serif; font-size: 12px; transition: all .2s; display: flex; flex-direction: column; align-items: center; gap: 4px; }

  .sign-btn .elname { font-size: 11px; color: #a89880; }
  .sign-btn:hover, .sign-btn.selected { background: #f0d0d8; border-color: #8b3a52; color: #1a0a0e; }
  .sign-btn.selected .elname { color: #8b3a52; }

  .result-box { background: #fae8ec; border: 0.5px solid #e0a8b5; border-radius: 10px; padding: 1.25rem; margin-top: 1rem; min-height: 80px; }
  .loading { color: #7a2030; font-size: 13px; text-align: center; padding: 1.5rem; font-style: italic; }

  .result-header { display: flex; align-items: center; gap: 14px; margin-bottom: 1.2rem; padding-bottom: .9rem; border-bottom: 0.5px solid #e0a8b5; }
  .result-glyph { font-size: 42px; }
  .result-name { font-family: 'Cinzel', serif; font-size: 18px; color: #8b3a52; }
  .result-tagline { font-size: 13px; color: #7a2030; margin-top: 3px; font-style: italic; }
  .result-dates { font-size: 12px; color: #6a3040; margin-top: 3px; }

  .section-label { font-family: 'Cinzel', serif; font-size: 10px; color: #6a3040; letter-spacing: .18em; text-transform: uppercase; margin-bottom: .6rem; display: flex; align-items: center; gap: 8px; }

  .desc-source { font-size: 10px; color: #7a2030; margin-bottom: 1.1rem; padding-left: 1rem; }

  .summary-block { font-size: 14px; line-height: 1.9; color: #1a0a0e; margin-bottom: 1rem; }

  .divider { height: 0.5px; background: #e8c0ca; margin: 1.25rem 0; }

  .keywords { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1.1rem; }
  .kw { border-radius: 20px; padding: 3px 10px; font-size: 11px; }
  .kw-str { background: rgba(139,58,82,.08); border: 0.5px solid rgba(139,58,82,.3); color: #8b3a52; }
  .kw-wk  { background: rgba(180,40,40,.08); border: 0.5px solid rgba(180,40,40,.3); color: #b02020; }

  .trait-box h4 { font-family: 'Cinzel', serif; font-size: 10px; color: #6a3040; letter-spacing: .12em; margin-bottom: .5rem; }
  .trait-box p { font-size: 13px; color: #d4c8a8; line-height: 1.7; }

  .love-box { background: #f7e0e6; border: 0.5px solid #d890a5; border-radius: 8px; padding: .85rem 1rem; margin-bottom: 1rem; }
  .love-box h4 { font-family: 'Cinzel', serif; font-size: 10px; color: #7a1030; letter-spacing: .12em; margin-bottom: .5rem; }
  .love-box p { font-size: 13px; color: #4a1020; line-height: 1.7; }

  .ai-text { font-size: 14px; line-height: 1.9; color: #1a0a0e; }

  .section-box { background: #f5dde3; border: 0.5px solid #e0a8b5; border-radius: 10px; padding: 1.25rem; margin-bottom: 1rem; }
  .section-box h3 { font-family: 'Cinzel', serif; font-size: 12px; color: #6a3040; letter-spacing: .12em; margin-bottom: 1rem; }
  .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .input-group label { display: block; font-size: 11px; color: #6a3040; letter-spacing: .08em; text-transform: uppercase; margin-bottom: 5px; }
  input[type="date"], input[type="time"], select { width: 100%; background: #fae8ec; border: 0.5px solid #e0a8b5; border-radius: 8px; color: #1a0a0e; padding: .5rem .8rem; font-family: 'Raleway', sans-serif; font-size: 13px; cursor: pointer; }
  input:focus, select:focus { outline: none; border-color: #8b3a52; }

  select option { background: #fae8ec; }

  /* Oma päivämäärävalitsin */
  .date-picker { display: flex; gap: 8px; align-items: stretch; }
  .date-field { display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .date-field.day { flex: 0 0 76px; }
  .date-field.month { flex: 0 0 76px; }
  .date-field.year { flex: 0 0 76px; }
  .date-field > label { font-size: 10px; color: #7a2030; letter-spacing: .08em; text-transform: uppercase; align-self: flex-start; }
  .date-spinner { display: flex; flex-direction: column; align-items: center; background: #fae8ec; border: 0.5px solid #e0a8b5; border-radius: 8px; overflow: hidden; width: 100%; }
  .date-spinner .spin-btn { background: none; border: none; cursor: pointer; color: #8b3a52; font-size: 16px; padding: 3px 0; width: 100%; line-height: 1; transition: background .15s; }
  .date-spinner .spin-btn:hover { background: rgba(139,58,82,.1); }
  .date-spinner .spin-input { font-family: 'Raleway', sans-serif; font-size: 15px; color: #1a0a0e; padding: 5px 4px; text-align: center; width: 100%; border-top: 0.5px solid #e0a8b5; border-bottom: 0.5px solid #e0a8b5; border-left: none; border-right: none; border-radius: 0; background: #fae8ec; outline: none; box-sizing: border-box; }
  .date-reset-wrap { display: flex; flex-direction: column; align-items: flex-start; gap: 3px; }
  .date-reset-wrap > label { font-size: 10px; color: #7a2030; letter-spacing: .08em; text-transform: uppercase; white-space: nowrap; }
  .date-reset { display: flex; align-items: center; justify-content: center; width: 76px; background: #8b3a52; border: 0.5px solid #6a2038; border-radius: 8px; cursor: pointer; color: #fff; font-size: 26px; transition: background .15s; flex: 1; }

  .sign-detected { margin-top: .75rem; padding: .5rem .75rem; background: rgba(139,58,82,.08); border: 0.5px solid rgba(139,58,82,.4); border-radius: 6px; font-size: 12px; color: #8b3a52; display: none; }

  .btn-primary { width: 100%; padding: .85rem; background: transparent; border: 0.5px solid #c9a84c; border-radius: 8px; color: #8b3a52; font-family: 'Cinzel', serif; font-size: 13px; letter-spacing: .1em; cursor: pointer; transition: all .2s; margin-bottom: .75rem; }
  .btn-primary:hover { background: rgba(201,168,76,.1); }
  .btn-primary:active { transform: scale(.98); }
  .btn-secondary { width: 100%; padding: .7rem; background: transparent; border: 0.5px solid #e8b0bc; border-radius: 8px; color: #a89880; font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: .08em; cursor: pointer; transition: all .2s; margin-bottom: 1rem; }
  .btn-secondary:hover { border-color: #a89880; color: #1a0a0e; }

  .compat-header { display: flex; align-items: center; justify-content: center; gap: 1.5rem; margin-bottom: 1rem; padding-bottom: .75rem; border-bottom: 0.5px solid #e0a8b5; }

  .compat-sign .glyph { font-size: 36px; }
  .compat-sign .name { font-size: 13px; color: #8b3a52; font-family: 'Cinzel', serif; }
  .compat-heart { font-size: 72px; color: #8a3a3a; }
  .best-match-box { background: #8b3a52; color: #fff; border-radius: 10px; padding: 1rem 1.25rem; text-align: center; font-family: 'Cinzel', serif; font-size: 14px; letter-spacing: .1em; margin-bottom: 1.25rem; }
  .score-bar { display: flex; align-items: center; gap: 12px; margin: .9rem 0; }
  .score-label { font-size: 13px; color: #6a3040; min-width: 110px; display: flex; align-items: center; gap: 6px; }
  .score-emoji { font-size: 28px; line-height: 1; }
  .bar-track { flex: 1; height: 4px; background: #e8c0ca; border-radius: 2px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 2px; background: #8b3a52; transition: width .8s ease; width: 0%; }
  .score-num { font-size: 13px; color: #8b3a52; min-width: 36px; text-align: right; }
  .error-text { color: #8b0000; font-size: 13px; padding: 1rem; text-align: center; }
  .error-small { color: #7a2030; font-size: 11px; text-align: center; margin-top: 4px; }

  @media (max-width: 480px) {
    .two-col { grid-template-columns: 1fr; }
    .input-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="stars-bg" id="stars"></div>
<div class="container">


  <h1>✦ TÄHTIEN VIESTI ✦</h1>
  <p class="subtitle">Horoskoopit &amp; kosminen yhteensopivuus</p>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('merkit')">Horoskooppimerkit</button>
    <button class="tab" onclick="switchTab('syntyma')">Syntymätiedot</button>
    <button class="tab" onclick="switchTab('compat')">Yhteensopivuus</button>
  </div>

  <div id="panel-merkit" class="panel active">
    <div class="signs-grid" id="signsGrid"></div>
    <div class="result-box" id="signResult">
      <p class="loading">Valitse merkki nähdäksesi sen ominaisuudet...</p>
    </div>
  </div>

  <div id="panel-syntyma" class="panel">
    <div class="section-box">
      <h3>SYNTYMÄTIETOSI</h3>
      <div class="input-grid">
        <div class="input-group" style="grid-column:1/-1"><label>Syntymäpäivä</label><div id="bdayDatePicker"></div></div>
      </div>
      <div class="sign-detected" id="detectedSign"></div>
    </div>
    <button class="btn-primary" onclick="showBdayBase()">✦ Näytä merkkini kuvaus ✦</button>

    <div class="result-box" id="bdayResult">
      <p class="loading">Anna syntymäpäiväsi saadaksesi kuvauksesi...</p>
    </div>
  </div>

  <div id="panel-compat" class="panel">
    <div class="section-box">
      <h3>HENKILÖ 1</h3>
      <div class="input-grid">
        <div class="input-group"><label>Syntymäpäivä</label><div id="p1datePicker"></div></div>
        <div class="input-group"><label>Merkki</label><select id="p1sign"><option value="">— valitse —</option></select></div>
      </div>
      <div class="sign-detected" id="p1detected"></div>
    </div>
    <div class="section-box">
      <h3>HENKILÖ 2</h3>
      <div class="input-grid">
        <div class="input-group"><label>Syntymäpäivä</label><div id="p2datePicker"></div></div>
        <div class="input-group"><label>Merkki</label><select id="p2sign"><option value="">— valitse —</option></select></div>
      </div>
      <div class="sign-detected" id="p2detected"></div>
    </div>
    <button class="btn-primary" onclick="analyzeCompat()">✦ Tutki kosminen yhteys ✦</button>
    <div class="result-box" id="compatResult">
      <p class="loading">Anna molempien syntymätiedot tai valitse merkit...</p>
    </div>
  </div>

</div>

function getSignFromDate(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr), m = d.getMonth()+1, day = d.getDate();
  for (let i=0; i<SIGNS.length; i++) {
    const {start:[sm,sd], end:[em,ed]} = SIGNS[i];
    if (sm <= em) { if ((m===sm&&day>=sd)||(m===em&&day<=ed)||(m>sm&&m<em)) return i; }
    else { if ((m===sm&&day>=sd)||(m===em&&day<=ed)||m>sm||m<em) return i; }
  }
  return null;
}

function daysInMonth(m, y) {
  return new Date(y, m, 0).getDate();
}

function createDatePicker(containerId, onChangeCb) {
  const container = document.getElementById(containerId);
  const state = { d: null, m: null, y: null };
  const MIN_YEAR = 1920, MAX_YEAR = new Date().getFullYear();

  function notify() {
    if (onChangeCb) onChangeCb(getDateStr());
  }

  function getDateStr() {
    if (state.d && state.m && state.y) {
      return `${state.y}-${String(state.m).padStart(2,'0')}-${String(state.d).padStart(2,'0')}`;
    }
    return null;
  }

  function clampDay() {
    if (state.d && state.m && state.y) {
      const maxD = daysInMonth(state.m, state.y);
      if (state.d > maxD) state.d = maxD;
    }
  }

  function render() {
    const dVal = state.d !== null ? String(state.d).padStart(2,'0') : '';
    const mVal = state.m !== null ? String(state.m).padStart(2,'0') : '';
    const yVal = state.y !== null ? String(state.y) : '';

    container.innerHTML = `
      <div class="date-picker">
        <div class="date-field day">
          <label>Päivä</label>
          <div class="date-spinner">
            <button class="spin-btn" onclick="dateSpin('${containerId}','d',1)">▲</button>
            <input class="spin-input" type="text" inputmode="numeric" maxlength="2"
              placeholder="pp" value="${dVal}"
              onchange="dateInputChange('${containerId}','d',this.value)"
              oninput="this.value=this.value.replace(/[^0-9]/g,'')" />
            <button class="spin-btn" onclick="dateSpin('${containerId}','d',-1)">▼</button>
          </div>
        </div>
        <div class="date-field month">
          <label>Kuukausi</label>
          <div class="date-spinner">
            <button class="spin-btn" onclick="dateSpin('${containerId}','m',1)">▲</button>
            <input class="spin-input" type="text" inputmode="numeric" maxlength="2"
              placeholder="kk" value="${mVal}"
              onchange="dateInputChange('${containerId}','m',this.value)"
              oninput="this.value=this.value.replace(/[^0-9]/g,'')" />
            <button class="spin-btn" onclick="dateSpin('${containerId}','m',-1)">▼</button>
          </div>
        </div>
        <div class="date-field year">
          <label>Vuosi</label>
          <div class="date-spinner">
            <button class="spin-btn" onclick="dateSpin('${containerId}','y',1)">▲</button>
            <input class="spin-input" type="text" inputmode="numeric" maxlength="4"
              placeholder="vvvv" value="${yVal}"
              onchange="dateInputChange('${containerId}','y',this.value)"
              oninput="this.value=this.value.replace(/[^0-9]/g,'')" />
            <button class="spin-btn" onclick="dateSpin('${containerId}','y',-1)">▼</button>
          </div>
        </div>
        <div class="date-reset-wrap">
          <label>Poista tiedot</label>
          <button class="date-reset" onclick="dateReset('${containerId}')" title="Tyhjennä">✕</button>
        </div>
      </div>`;
  }

  function spin(field, dir) {
    if (field === 'd') {
      const maxD = (state.m && state.y) ? daysInMonth(state.m, state.y) : 31;
      if (state.d === null) state.d = dir > 0 ? 1 : maxD;
      else { state.d += dir; if (state.d < 1) state.d = maxD; if (state.d > maxD) state.d = 1; }
    } else if (field === 'm') {
      if (state.m === null) state.m = dir > 0 ? 1 : 12;
      else { state.m += dir; if (state.m < 1) state.m = 12; if (state.m > 12) state.m = 1; }
      clampDay();
    } else if (field === 'y') {
      if (state.y === null) state.y = dir > 0 ? MIN_YEAR : MAX_YEAR;
      else { state.y += dir; if (state.y < MIN_YEAR) state.y = MAX_YEAR; if (state.y > MAX_YEAR) state.y = MIN_YEAR; }
      clampDay();
    }
    render();
    notify();
  }

  function inputChange(field, raw) {
    const n = parseInt(raw, 10);
    if (isNaN(n)) return;
    if (field === 'd') {
      if (n >= 1 && n <= 31) { state.d = n; clampDay(); }
    } else if (field === 'm') {
      if (n >= 1 && n <= 12) { state.m = n; clampDay(); }
    } else if (field === 'y') {
      if (n >= MIN_YEAR && n <= MAX_YEAR) state.y = n;
    }
    notify();
  }

  function reset() {
    state.d = null; state.m = null; state.y = null;
    render();
    notify();
  }

  render();
  return { spin, reset, getDateStr, inputChange };
}

// Registry
const DATE_PICKERS = {};

function dateSpin(id, field, dir) {
  if (DATE_PICKERS[id]) DATE_PICKERS[id].spin(field, dir);
}
function dateReset(id) {
  if (DATE_PICKERS[id]) DATE_PICKERS[id].reset();
}
function dateInputChange(id, field, val) {
  if (DATE_PICKERS[id]) DATE_PICKERS[id].inputChange(field, val);
}

async function claudeAPI(prompt) {
  if (!API_KEY) throw new Error('API-avain puuttuu.');
  const resp = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "content-type": "application/json", "x-api-key": API_KEY, "anthropic-version": "2023-06-01" },
    body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1000, messages: [{ role: "user", content: prompt }] })
  });
  if (!resp.ok) { const e = await resp.json().catch(()=>({})); throw new Error(e?.error?.message || `HTTP ${resp.status}`); }
  const data = await resp.json();
  return data.content.map(c => c.text||'').join('');
}

  '2-8':[+3,+6,-1],  // Kaksoset–Jousimies
  '3-9':[+2,+4,-2],  // Rapu–Kauris
  '4-10':[+2,+3,-3], // Leijona–Vesimies
  '5-11':[+3,+4,-1], // Neitsyt–Kalat
};

function getPairKey(i1, i2) {
  const a = Math.min(i1,i2), b = Math.max(i1,i2);
  return `${a}-${b}`;
}

function clamp(v) { return Math.max(30, Math.min(98, Math.round(v))); }

function calcScores(i1, i2) {
  const s1 = SIGNS[i1], s2 = SIGNS[i2];
  const base = EL_COMPAT[s1.el][s2.el];
  let [r, y, t] = [base[0], base[1], base[2]];
  const tweak = PAIR_TWEAK[getPairKey(i1,i2)];
  if (tweak) { r+=tweak[0]; y+=tweak[1]; t+=tweak[2]; }
  // sama merkki itsensä kanssa
  if (i1===i2) { r=78; y=92; t=80; }
  return { rakkaus: clamp(r), ystavyys: clamp(y), tyo: clamp(t) };
}

// Löytää yhteiset vahvuudet ja törmäykset
function sharedTraits(s1, s2) {
  const shared = s1.vahvuudet.filter(v => s2.vahvuudet.includes(v));
  const clash  = s1.heikkoudet.filter(h => s2.heikkoudet.includes(h));
  return { shared, clash };
}

function toPartitive(word) {
  return PARTITIVE[word] || word.toLowerCase() + 'a';
}

function buildCompatText(i1, i2, scores) {
  const s1 = SIGNS[i1], s2 = SIGNS[i2];
  if (i1 === i2) {
    return `Kaksi ${s1.fi.toLowerCase()}ta yhdessä — yhteistä on paljon, ehkä liikaakin. ${s1.kuvaus} Molemmat tunnistavat toisessaan omat vahvuutensa ja heikkoutensa kuin peilistä, mikä voi olla yhtä aikaa helpottavaa ja haastavaa. Rakkaudessa yhteinen sävel löytyy nopeasti: ${s1.rakkaus.toLowerCase()} Ystävyys kukoistaa jaetun maailmankuvan varassa, mutta töissä samanlainen toimintatapa voi johtaa siihen, että kumpikin odottaa toisen tekevän sen osan, joka molemmilta jää helposti tekemättä.`;
  }

  const elKey = `${s1.el}-${s2.el}`;
  const elDesc = EL_DESC[elKey] || '';
  const { shared, clash } = sharedTraits(s1, s2);

  let yhteista = '';
  if (shared.length > 0) {
    yhteista = ` Yhteistä maaperää löytyy: molemmat arvostavat ${shared.slice(0,2).map(v=>toPartitive(v)).join(' ja ')}.`;
  }

  let kitka = '';
  if (clash.length > 0) {
    kitka = ` Hankausta voi syntyä, kun molempien ${toPartitive(clash[0])} törmää toisiinsa.`;
  }

  let loveLine = '';
  if (scores.rakkaus >= 80) {
    loveLine = `Rakkaudessa yhteys on vahva — ${s1.rakkaus.toLowerCase()} ${s2.rakkaus.toLowerCase()}`;
  } else if (scores.rakkaus >= 60) {
    loveLine = `Rakkaus vaatii molemminpuolista joustoa — ${s1.rakkaus.toLowerCase()} ${s2.rakkaus.toLowerCase()}`;
  } else {
    loveLine = `Rakkauden polku ei ole suoraviivaisin — ${s1.rakkaus.toLowerCase()} ${s2.rakkaus.toLowerCase()}`;
  }

  let workLine = '';
  if (scores.tyo >= 80) {
    workLine = `Töissä nämä kaksi täydentävät toisiaan luontevasti.`;
  } else if (scores.tyo >= 65) {
    workLine = `Yhteistyö onnistuu, kun roolit ovat selkeät.`;
  } else {
    workLine = `Yhteistyössä kannattaa sopia pelisäännöistä etukäteen.`;
  }

  const s1vahv = s1.vahvuudet.slice(0,2).map(v=>toPartitive(v)).join(' ja ');
  const s2vahv = s2.vahvuudet.slice(0,2).map(v=>toPartitive(v)).join(' ja ');

  return `${elDesc}${yhteista}${kitka} ${s1.fi} tuo suhteeseen ${s1vahv}, ${s2.fi.toLowerCase()} puolestaan ${s2vahv}. ${loveLine} ${workLine}`;
}

function analyzeCompat() {
  const i1 = parseInt(document.getElementById('p1sign').value);
  const i2 = parseInt(document.getElementById('p2sign').value);
  const box = document.getElementById('compatResult');
  if (isNaN(i1)||isNaN(i2)) { box.innerHTML=`<p class="error-text">Valitse tai anna molempien syntymätiedot.</p>`; return; }
  const s1=SIGNS[i1], s2=SIGNS[i2];
  const scores = calcScores(i1, i2);
  const teksti = buildCompatText(i1, i2, scores);

  box.innerHTML = `
    <div class="compat-header">
      <div class="compat-sign"><div class="glyph">${s1.glyph}</div><div class="name">${s1.fi}</div></div>
      <div class="compat-heart">♥</div>
      <div class="compat-sign"><div class="glyph">${s2.glyph}</div><div class="name">${s2.fi}</div></div>
    </div>
    ${(() => {
      const max = Math.max(scores.rakkaus, scores.ystavyys, scores.tyo);
      let teksti, emoji;
      if (scores.rakkaus === max) { teksti = 'RAKASTAVAISINA VÄLINNE OVAT PARHAIMMILLAAN'; emoji = '💕'; }
      else if (scores.ystavyys === max) { teksti = 'TULETTE PARHAITEN TOIMEEN YSTÄVINÄ'; emoji = '🤝'; }
      else { teksti = 'TYÖKAVEREINA TULETTE PARHAITEN TOIMEEN'; emoji = '💼'; }
      return `<div class="best-match-box">${emoji} ${teksti} ${emoji}</div>`;
    })()}
    <div class="score-bar"><span class="score-label"><span class="score-emoji">💏</span> Rakkaus</span><div class="bar-track"><div class="bar-fill" data-val="${scores.rakkaus}"></div></div><span class="score-num">${scores.rakkaus}%</span></div>
    <div class="score-bar"><span class="score-label"><span class="score-emoji">👯</span> Ystävyys</span><div class="bar-track"><div class="bar-fill" data-val="${scores.ystavyys}"></div></div><span class="score-num">${scores.ystavyys}%</span></div>
    <div class="score-bar"><span class="score-label"><span class="score-emoji">👩‍🏫</span> Työ</span><div class="bar-track"><div class="bar-fill" data-val="${scores.tyo}"></div></div><span class="score-num">${scores.tyo}%</span></div>
    <div class="divider"></div>
    <p class="section-label">Yhteensopivuus</p>
    <div class="ai-text">${teksti}</div>
    <div class="divider"></div>
    <div class="two-col">
      <div class="trait-box"><h4>${s1.glyph} ${s1.fi.toUpperCase()} tuo</h4><div class="keywords">${kwHtml(s1.vahvuudet,'kw-str')}</div></div>
      <div class="trait-box"><h4>${s2.glyph} ${s2.fi.toUpperCase()} tuo</h4><div class="keywords">${kwHtml(s2.vahvuudet,'kw-str')}</div></div>
    </div>`;

  setTimeout(() => { document.querySelectorAll('.bar-fill').forEach(el => { el.style.width=el.dataset.val+'%'; }); }, 100);
}
